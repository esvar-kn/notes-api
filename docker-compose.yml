services:
  # Relational Database Service (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: notes-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-notesdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # In-memory Cache Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: notes-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # REST API Server
  api:
    build:
      context: .
      dockerfile: DockerFile
    container_name: notes-api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    command: sh -c "npx prisma migrate deploy && node index.js"

volumes:
  pgdata:
  redisdata:
